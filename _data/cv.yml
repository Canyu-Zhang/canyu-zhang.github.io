    Experience:
      - company: NYU Shanghai — Prof. Shengjie Wang & Prof. Tianyi Zhou
        position: Research Assistant
        location: Shanghai, China
        start_date: 2025-06
        end_date: present
        summary: "InfoFlow KV: Information-Flow-Aware KV Recomputation for Long Context (ICML 2026, co-first author)"
        highlights:
          - Built a chunk-based KV prefilling and recomputation pipeline enabling reusable KV caches across multiple LLMs (Qwen, LLaMA, ChatGLM).
          - Proposed query-conditioned attention-norm token selection and chunk reordering, achieving +6% F1 on HotpotQA.

      - company: NYU Shanghai — Prof. Shengjie Wang & Prof. Tianyi Zhou
        position: Research Assistant
        location: Shanghai, China
        start_date: 2025-03
        end_date: 2025-08
        summary: "Submodular Context Partitioning and Compression for In-Context Learning"
        highlights:
          - Studied Sub-CP, a block-aware context selection framework leveraging submodular objectives for in-context learning.
          - Achieved +7.1% average F1 over baseline partition methods and +15.4% F1 on TREC.

      - company: NYU Shanghai — Prof. Chen Zhao
        position: Research Assistant
        location: Shanghai, China
        start_date: 2025-09
        end_date: 2026-02
        summary: "SAGE: Benchmarking and Improving Retrieval for Deep Research Agents (ACL 2026)"
        highlights:
          - Built SAGE, a benchmark with 1,200 queries across four domains and a 200K-paper corpus.
          - Proposed corpus-level test-time scaling, improving retrieval by +8% (short-form) and +2% (open-ended).

      - company: NYU Shanghai — Prof. Saining Xie (Course Project)
        position: Student Researcher
        location: Shanghai, China
        start_date: 2025-09
        end_date: 2025-12
        summary: "Decoding VGGT Features in 3D with Sparse Convolution (Computer Vision)"
        highlights:
          - Built a feed-forward Gaussian Splatting refinement pipeline on VGGT/AnySplat, with a ResNet-style sparse 3D convolutional decoder.
          - Proposed kernel normalization for sparse 3D convolutions; improved PSNR 22.05→23.22, SSIM 0.692→0.744.

